version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commission-calculator
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/db
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db-data:
    driver: local
